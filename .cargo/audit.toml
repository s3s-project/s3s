# Project-level cargo-audit configuration
# See: https://github.com/RustSec/rustsec/blob/main/cargo-audit/audit.toml.example

[advisories]
# rsa v0.9.10: Marvin Attack timing sidechannel in RSA PKCS#1 decryption.
# Transitive dependency via reqsign-core → opendal → s3s-fs (dev-dependency).
# Only used for S3 signature verification, not decryption. Low risk. No fix available.
ignore = [
    "RUSTSEC-2023-0071",
    # proc-macro-error2: unmaintained, transitive via jiff → defmt → defmt-macros
    "RUSTSEC-2026-0173",
    # quick-xml 0.39.4 and 0.40.1: Quadratic run time when checking a start tag
    # for duplicate attribute names. These are transitive dependencies via:
    # - opendal-core (0.39.4)
    # - opendal-service-s3 (0.39.4, 0.40.1)
    # - reqsign-aws-v4 (0.40.1)
    # Waiting for opendal to release a new version using quick-xml 0.41.0+.
    # Upstream issue: https://github.com/apache/opendal
    "RUSTSEC-2026-0194",
]
